name: CI

on:
  push:
    paths:
      - "server/**"
      - "mobile/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "server/**"
      - "mobile/**"
      - ".github/workflows/ci.yml"

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Docker build
        working-directory: .
        run: docker build -f server/Dockerfile -t ecommerce-server:ci ./server

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Legacy guard
        run: |
          ! rg -n "features/core/network|lib/services|lib/state|auth_controller.dart|auth_repo.dart" lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
