services:
  mongo:
    image: mongo:7
    container_name: ecommerce_mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"try{st=rs.status(); st.ok && st.myState==1 ? 0 : 1}catch(e){1}\""]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  server:
    build: ./server
    container_name: ecommerce_server
    env_file:
      - ./server/.env
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    build: ./admin
    container_name: ecommerce_admin
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data:
  redis_data:
